name: Build and Deploy Compose Web to GitHub Pages (Actions deploy)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Diagnostic step removed to avoid YAML parsing issues; deployment will use the PAT in 'TOKEN_TOKEN' secret.

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build production deployment
        run: |
          chmod +x gradlew
          ./gradlew :composeApp:wasmJsBrowserDistribution --no-daemon --no-parallel

      - name: Prepare site directory
        run: |
          PUBLISH_DIR=./build/site
          rm -rf "$PUBLISH_DIR"
          mkdir -p "$PUBLISH_DIR"
          # Kotlin 2.0+ distribution path
          DIST_DIR=composeApp/build/dist/wasmJs/productionExecutable
          cp -r $DIST_DIR/* "$PUBLISH_DIR/"
          # Ensure index.html and styles.css are present (they should be copied by the task, but just in case)
          cp composeApp/src/commonMain/resources/index.html "$PUBLISH_DIR/" || true
          cp composeApp/src/commonMain/resources/styles.css "$PUBLISH_DIR/" || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

